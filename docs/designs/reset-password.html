<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Stacks — Reset password (web design)</title>
<!-- DESIGN SPEC: static mockup of the real ResetPasswordForm
     (src/routes/auth/_components/reset-password-form.tsx + auth-card.tsx). Depicts the
     new-password form (with field-error + form-error states) AND the "Password updated"
     success state. Tokens copied verbatim from docs/designs/catalog.html; auth rules
     verbatim from src/styles.css. -->
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"><style>
/* ============================================================
   STACKS — design tokens (extract these verbatim)
   Display: Fraunces | Body: Inter | Mono (call numbers): JetBrains Mono
   ============================================================ */
:root{
  --ink:#20231F;          /* primary text */
  --muted:#6B6F69;        /* secondary text */
  --faint:#9A9A93;        /* tertiary / unavailable */
  --bg:#F7F6F1;           /* page (cool paper, NOT cream) */
  --surface:#FFFFFF;      /* cards */
  --line:#E5E3DB;         /* hairline borders */
  --pine:#2C5949;         /* primary accent */
  --pine-700:#1F4034;     /* primary pressed */
  --sage-100:#E6EDE7;     /* available chip bg */
  --brass:#9A7637;        /* shelf-tab accent */
  --brass-700:#6F531F;    /* shelf-tab text */
  --brass-100:#F0E7D4;    /* shelf-tab bg */
  --radius:10px; --radius-sm:6px; --radius-pill:999px;
  --sp-1:4px; --sp-2:8px; --sp-3:12px; --sp-4:16px; --sp-5:24px; --sp-6:32px; --sp-8:48px;
  --shadow:0 1px 2px rgba(32,35,31,.05),0 4px 16px rgba(32,35,31,.05);
  --font-display:'Fraunces',Georgia,serif;
  --font-body:'Inter',system-ui,sans-serif;
  --font-mono:'JetBrains Mono',ui-monospace,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-body);color:var(--ink);background:var(--bg);
  font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
.wordmark{font-family:var(--font-display);font-weight:600;font-size:22px;letter-spacing:-.01em}
.wordmark .dot{color:var(--pine)}

/* ---- buttons ---- */
.btn{font:inherit;font-weight:500;font-size:14px;padding:10px 18px;border-radius:var(--radius);
  border:1px solid var(--line);background:var(--surface);color:var(--ink);cursor:pointer}
.btn.primary{background:var(--pine);border-color:var(--pine);color:#fff}
.btn.primary:hover{background:var(--pine-700)}

/* Consistent, visible keyboard focus for all interactive elements (a11y). */
a:focus-visible,
button:focus-visible,
input:focus-visible,
[tabindex]:focus-visible{
  outline:2px solid var(--pine);
  outline-offset:2px;
  border-radius:var(--radius-sm);
}

/* ---- auth screens (copied verbatim from src/styles.css) ---- */
.auth-page{
  max-width:420px;
  margin:0 auto;
  padding:var(--sp-8) var(--sp-5);
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:var(--sp-6);
}
.auth-brand{font-size:26px}
.auth-card{
  width:100%;
  background:var(--surface);
  border:1px solid var(--line);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  padding:var(--sp-6);
}
.auth-title{
  font-family:var(--font-display);
  font-weight:600;
  font-size:26px;
  letter-spacing:-.01em;
}
.auth-sub{color:var(--muted);margin-top:var(--sp-1)}
.auth-form{display:flex;flex-direction:column;margin-top:var(--sp-5)}
.form-field{display:flex;flex-direction:column;gap:var(--sp-1)}
.form-field label{font-size:13px;font-weight:500;color:var(--ink)}
.form-field input{
  font:inherit;
  color:var(--ink);
  background:var(--bg);
  border:1px solid var(--line);
  border-radius:var(--radius-sm);
  padding:10px 12px;
}
.form-field input:focus{
  outline:2px solid color-mix(in srgb,var(--pine) 40%,transparent);
  outline-offset:1px;
  background:var(--surface);
}
.field-error{min-height:16px;font-size:12px;color:#a23b2c}
.form-error{
  font-size:13px;
  color:#a23b2c;
  background:#f7e9e6;
  border:1px solid #e6c9c2;
  border-radius:var(--radius-sm);
  padding:8px 12px;
  margin-bottom:var(--sp-3);
}
.auth-submit{width:100%;margin-top:var(--sp-2)}
.auth-foot{
  margin-top:var(--sp-5);
  font-size:13px;
  color:var(--muted);
  text-align:center;
}
.auth-foot a{color:var(--pine);font-weight:500}
.auth-note{margin-top:var(--sp-4);color:var(--muted)}

/* design-doc only: label above each state variant (not part of the app) */
.state-label{width:100%;max-width:420px;font-family:var(--font-mono);font-size:11px;
  letter-spacing:.04em;text-transform:uppercase;color:var(--faint);margin-bottom:calc(-1 * var(--sp-3))}
</style></head>
<body>
<main class="auth-page">
  <a href="catalog.html" class="wordmark auth-brand">Stacks<span class="dot">.</span></a>

  <!-- ===== STATE 1: the new-password form (default, when token present) ===== -->
  <p class="state-label">State · form</p>
  <div class="auth-card">
    <h1 class="auth-title">Reset password</h1>
    <p class="auth-sub">Choose a new password.</p>

    <form class="auth-form">
      <div class="form-field">
        <label for="password">New password</label>
        <input id="password" name="password" type="password" autocomplete="new-password" value="short">
        <!-- populated field-error state (zod: passwordSchema) -->
        <p class="field-error" role="alert">Password must be at least 8 characters</p>
      </div>

      <!-- form-error state: surfaced from reset.error via extractErrorMessage() -->
      <p class="form-error" role="alert">This reset link is invalid or has expired.</p>

      <button type="submit" class="btn primary auth-submit">Reset password</button>
    </form>

    <p class="auth-foot">
      <a href="login.html">Back to sign in</a>
    </p>
  </div>

  <!-- ===== STATE 2: success (on reset.isSuccess) ===== -->
  <p class="state-label">State · success</p>
  <div class="auth-card">
    <h1 class="auth-title">Password updated</h1>
    <p class="auth-note">Your password has been reset. You can sign in now.</p>

    <p class="auth-foot">
      <a href="login.html">Sign in</a>
    </p>
  </div>
</main>
</body></html>
